{% extends "base.html" %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
{% endblock %}

{% block content %}
<header class="topbar">
    <div class="topbar-inner">
        <div class="brand">
            <img class="brand-logo" src="{{ favicon_url }}" alt="">
            <span class="brand-name">{{ site_title }}</span>
        </div>
        <div class="topbar-actions">
            <button id="historyBtn" class="btn btn-ghost btn-sm" title="觀看歷史">
                <svg class="icon" viewBox="0 0 24 24"><path d="M3 3v5h5"/><path d="M3.05 13A9 9 0 1 0 6 5.3L3 8"/><path d="M12 7v5l3 3"/></svg>
                <span class="label-text">歷史</span>
            </button>
            <a href="/setup" class="btn btn-ghost btn-sm" title="站點與設定">
                <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span class="label-text">設定</span>
            </a>
            <a href="/logout" class="btn btn-ghost btn-sm" title="登出">
                <svg class="icon" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                <span class="label-text">登出</span>
            </a>
        </div>
    </div>
</header>

<div class="container">
    <div class="toolbar">
        <div class="search-bar">
            <svg class="icon search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="search" id="searchInput" placeholder="搜尋影片名稱…" autocomplete="off">
            <button id="toSimpBtn" class="btn btn-ghost simp-btn" title="把搜尋字轉成簡體">簡</button>
            <button id="multiSiteSelectBtn" class="btn btn-secondary" title="選擇多個站台一起搜尋">
                <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                <span class="label-text">多站</span>
            </button>
            <button id="searchBtn" class="btn btn-primary">搜尋</button>
        </div>
        <div id="selectedSites" class="selected-sites-display"></div>
        <div id="searchTagsContainer" class="search-tags-container"></div>
    </div>

    <nav class="strip" id="siteStripWrap" aria-label="站台">
        <span class="strip-label">站台</span>
        <div id="siteStrip" class="chip-strip"></div>
    </nav>
    <nav class="strip" id="categoryStripWrap" aria-label="分類">
        <span class="strip-label">分類</span>
        <div id="categoryStrip" class="chip-strip"></div>
    </nav>

    <div id="error" class="error-message" style="display: none;"></div>

    <main class="content-area">
        <div id="videoGrid"></div>
        <div id="pagination" class="pagination"></div>
    </main>
</div>

<footer class="footer"><span>版本 {{ version }}</span></footer>

<button id="scrollToTopBtn" class="fab" title="回到頂部" style="display:none;">
    <svg class="icon" viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
</button>
<button id="scrollToBottomBtn" class="fab" title="到底部" style="display:none;">
    <svg class="icon" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
</button>

<div id="videoModal" class="modal">
    <div class="modal-content">
        <header class="modal-header">
            <h3 id="modalTitle" class="modal-title">
                <span class="title-text"></span>
                <span id="sourceCount" class="source-count" style="display: none;"></span>
                <button id="copyTitleBtn" class="copy-title-btn" title="複製標題">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                </button>
            </h3>
            <button class="close-btn" title="關閉">
                <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </header>
        <main class="modal-body">
            <div id="artplayer-container"></div>
            <div class="playlist-container">
                <div id="playlistSources" class="playlist-sources"></div>
                <div id="episodeList" class="episode-list"></div>
            </div>
        </main>
    </div>
</div>

<div id="siteSelectionModal" class="modal">
    <div class="modal-content">
        <header class="modal-header">
            <h3 class="modal-title">選擇搜尋站台</h3>
            <button class="close-btn" title="關閉">
                <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </header>
        <main class="modal-body" style="flex-direction: column;">
            <div id="siteCheckboxList" class="site-checkbox-list"></div>
            <footer class="modal-footer">
                <button id="selectAllSitesBtn" class="btn btn-secondary">全選</button>
                <button id="deselectAllSitesBtn" class="btn btn-secondary">取消全選</button>
                <button id="confirmSiteSelectionBtn" class="btn btn-primary">確定</button>
            </footer>
        </main>
    </div>
</div>

<div id="historyOverlay" class="history-overlay" style="display: none;"></div>
<div id="historyPanel" class="history-panel" style="display: none;">
    <div class="history-header">
        <h3>觀看歷史</h3>
        <div class="history-actions">
            <button id="clearHistoryBtn" class="btn btn-outline-danger btn-sm">清除全部</button>
            <button id="historyCloseBtn" class="btn btn-ghost btn-icon btn-sm" title="關閉">
                <svg class="icon" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </div>
    <div id="watchHistoryContainer" class="history-container"></div>
    <div class="history-footer">
        <button id="closeHistoryBtn" class="btn btn-secondary history-close-btn">關閉歷史面板</button>
    </div>
</div>

<div id="loader" class="loader" style="display: none;">載入中…</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/artplayer.js') }}"></script>
<script src="{{ url_for('static', filename='js/hls.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/artplayer-plugin-chromecast.js') }}"></script>
<script type="module" src="{{ url_for('static', filename='js/index.js') }}"></script>
{% endblock %}
