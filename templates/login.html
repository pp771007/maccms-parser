{% extends "base.html" %}

{% block title %}登入 - {{ site_title }}{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
{% endblock %}

{% block content %}
<div class="auth-card">
    <div class="auth-brand">
        <img class="auth-logo" src="{{ favicon_url }}" alt="">
        <span class="auth-app">{{ site_title }}</span>
    </div>
    <h1>歡迎回來</h1>
    <p class="auth-sub">請輸入密碼以繼續</p>
    {% if error %}
    <p class="auth-error">{{ error }}</p>
    {% endif %}
    <form method="post">
        {% if next_url %}<input type="hidden" name="next" value="{{ next_url }}">{% endif %}
        <input type="password" name="password" placeholder="密碼" required id="passwordInput" autocomplete="current-password">
        <button type="submit" class="btn btn-primary auth-submit">登入</button>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
{% endblock %}
